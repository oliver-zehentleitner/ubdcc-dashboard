name: Unit Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.9", "3.14" ]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: CLI import + help
        run: |
          python -c "from ubdcc_dashboard import cli; cli.main(['--help'])"
          python -c "from ubdcc_dashboard import cli; cli.main(['start', '--help'])"
          python -c "from ubdcc_dashboard import __version__; print(__version__)"

      - name: Verify static asset is bundled
        run: |
          python -c "from importlib import resources; p = resources.files('ubdcc_dashboard').joinpath('static/index.html'); assert p.is_file(), p; print('ok', p)"
