name: Build and Publish GH+PyPi

on:
  workflow_dispatch:
    branches:
      - master

jobs:
  build:
    name: Build sdist and noarch wheel
    runs-on: ubuntu-latest
    steps:
      - name: GitHub Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: artifact
          path: dist/*

  Release:
    needs: [build]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      discussions: write
      id-token: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          name: artifact
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            Please read the [CHANGELOG](https://github.com/oliver-zehentleitner/ubdcc-dashboard/blob/master/CHANGELOG.md) for further information.
          discussion_category_name: releases
          draft: false
          files: |
            dist/*.tar.gz
            dist/*.whl
          generate_release_notes: true
          name: ubdcc-dashboard
          prerelease: false
          tag_name: 0.3.0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create PyPi Release
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          verbose: true
          print-hash: true
